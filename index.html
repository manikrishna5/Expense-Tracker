<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Expense Tracker</h1>
    </header>

    <section>
        <h2 style="color:aqua"> Add Expense</h2>
        <form>
            <label for="description">Description:</label>
            <input type="text" id="description" name="description" required><br><br>

            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">-- Select Category --</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Shopping">Shopping</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Other">Other</option>
            </select><br><br>

            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" required><br><br>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required><br><br>

            <button type="submit">Add Expense</button>
        </form>
    </section>
    <!-- <section>
        <h2>Delete Expense</h2>
        <form>
            <label for="delete-id">Expense ID:</label>
            <input type="number" id="delete-id" name="delete-id" required><br><br>
            <button type="submit">Delete Expense</button>
        </form>
    </section> -->

    <section>
        <h2>Expense List</h2>
        <table border="1">
            <tr">
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            <tr>
                <!-- Dynamic expense rows will be added here -->
                <td><button>Delete</button></td>
            </tr>
        </table>
    </section>
    <section>
        <h2>Expense Summary</h2>
        <p>Total Expenses: $0.00</p>
    </section>
    <section>
        <h2> Category wise Summary</h2>
        <table border="1">
            <tr>
                <th>Category</th>
                <th>Total Amount</th>
            </tr>
            <tr>
                <!-- Dynamic category summary rows will be added here -->
            </tr>
        </table>
    </section>
    <section>
        <h2>Reset Data</h2>
        <button>Reset All Data</button>
    </section>
    <footer>
        <p>&copy; 2024 Expense Tracker. All rights reserved.</p>
    </footer>
</body>
</html>
